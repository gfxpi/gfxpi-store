<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gfx_PI | Ultra Digital Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap');
        
        :root {
            --p: #00ffa3; 
            --s: #0070f3;
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* Background Effects */
        .glow { position: fixed; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(0,255,163,0.08) 0%, transparent 70%); top: -10%; left: -10%; z-index: -1; pointer-events: none; filter: blur(60px); }
        .glow-2 { position: fixed; width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(0,112,243,0.08) 0%, transparent 70%); bottom: -10%; right: -10%; z-index: -1; filter: blur(60px); }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 6%; background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 24px; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: -1.5px; }
        .logo span { color: var(--p); }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .cart-btn { background: #fff; color: #000; padding: 10px 22px; border-radius: 50px; font-weight: 800; cursor: pointer; border: none; font-size: 13px; position: relative; }
        #cart-count { background: var(--p); color: #000; padding: 2px 6px; border-radius: 50%; font-size: 10px; position: absolute; top: -5px; right: 0; border: 2px solid #000; }

        /* Hero Section */
        .hero { padding: 120px 20px 60px; text-align: center; }
        .hero h1 { font-size: clamp(45px, 10vw, 95px); font-weight: 800; letter-spacing: -5px; line-height: 0.85; margin-bottom: 25px; }
        .hero span { color: var(--p); text-shadow: 0 0 40px rgba(0,255,163,0.2); }
        .hero p { color: #888; font-size: 18px; max-width: 600px; margin: 0 auto 40px; }

        /* Search & Filters */
        .controls { max-width: 1200px; margin: 0 auto 50px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px; padding: 0 20px; }
        .search-bar { background: var(--card); border: 1px solid var(--border); padding: 12px 25px; border-radius: 50px; color: #fff; width: 300px; outline: none; }
        .search-bar:focus { border-color: var(--p); }
        .filter-group { display: flex; gap: 10px; }
        .f-btn { background: var(--card); border: 1px solid var(--border); color: #888; padding: 8px 20px; border-radius: 50px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .f-btn.active { background: var(--p); color: #000; border-color: var(--p); }

        /* Bento Grid Store */
        .grid { max-width: 1200px; margin: 0 auto 100px; display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; padding: 20px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 35px; padding: 15px; position: relative; overflow: hidden; }
        .p-card:hover { border-color: rgba(0,255,163,0.4); transform: translateY(-10px); background: rgba(255,255,255,0.05); }
        
        .img-container { width: 100%; aspect-ratio: 16/10; border-radius: 25px; overflow: hidden; margin-bottom: 20px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .p-info h3 { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .p-info span { color: #666; font-size: 13px; display: block; margin-bottom: 15px; }
        .p-bottom { display: flex; justify-content: space-between; align-items: center; }
        .p-price { font-size: 24px; font-weight: 800; }
        .add-to-cart { background: var(--p); color: #000; border: none; padding: 12px 25px; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 14px; }

        /* Side Cart Panel */
        .side-panel { position: fixed; right: -100%; top: 0; width: 450px; height: 100%; background: #050505; border-left: 1px solid var(--border); z-index: 2000; padding: 40px; box-shadow: -20px 0 60px rgba(0,0,0,0.8); }
        .side-panel.active { right: 0; }
        .c-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card); border-radius: 20px; margin-bottom: 15px; }
        .remove-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 12px; font-weight: 700; }

        /* Payment Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(20px); }
        .modal.active { display: flex; }
        .m-card { background: #000; border: 1px solid var(--p); padding: 40px; border-radius: 40px; width: 95%; max-width: 420px; text-align: center; }
        .qr-code { width: 240px; border: 6px solid #fff; border-radius: 25px; margin: 30px 0; }
        .checkout-final { background: var(--p); color: #000; width: 100%; border: none; padding: 18px; border-radius: 20px; font-weight: 900; font-size: 16px; margin-top: 15px; cursor: pointer; }

        @media (max-width: 768px) { .side-panel { width: 100%; } .hero h1 { font-size: 55px; letter-spacing: -3px; } .search-bar { width: 100%; } }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div class="glow-2"></div>

    <nav>
        <a href="#" class="logo">GFX<span>_</span>PI</a>
        <div class="nav-right">
            <button class="cart-btn" onclick="toggleCart()">Cart <span id="cart-count">0</span></button>
        </div>
    </nav>

    <div class="hero">
        <h1>Design <span>Assets</span> For Pros.</h1>
        <p>Curated PSDs, LUTs, and Overlays to supercharge your thumbnail workflow.</p>
    </div>

    <div class="controls">
        <input type="text" class="search-bar" id="search" placeholder="Search products..." onkeyup="searchProducts()">
        <div class="filter-group">
            <button class="f-btn active" onclick="filter('all')">All Items</button>
            <button class="f-btn" onclick="filter('psd')">PSD Packs</button>
            <button class="f-btn" onclick="filter('lut')">LUTs</button>
        </div>
    </div>

    <div class="grid" id="product-grid"></div>

    <div class="side-panel" id="cart-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="font-size:32px; font-weight:800;">Your Cart</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:#fff; font-size:40px; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-list" style="max-height: 60%; overflow-y:auto;"></div>
        <div style="margin-top:40px; border-top: 1px solid var(--border); padding-top: 30px;">
            <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:800; margin-bottom:20px;">
                <span>Total</span>
                <span id="total-price" style="color:var(--p);">₹0</span>
            </div>
            <button class="checkout-final" onclick="showModal()">Checkout Order</button>
        </div>
    </div>

    <div class="modal" id="pay-modal">
        <div class="m-card">
            <h2>Complete Payment</h2>
            <p style="color:#666; font-size:13px; margin-top:5px;">Scan QR & send screenshot on WhatsApp</p>
            <img src="https://i.ibb.co/FNwb4v5/Whats-App-Image-2026-03-26-at-8-01-25-PM.jpg" class="qr-code" alt="Payment QR">
            <p style="font-weight:900; color:var(--p); font-size:18px;">UPI ID: peerifam@oksbi</p>
            <button class="checkout-final" onclick="confirmOrder()">✅ I Have Paid (Confirm)</button>
            <p onclick="hideModal()" style="margin-top:20px; color:#444; cursor:pointer; font-size:12px;">Cancel</p>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Valorant Viral PSD Pack", type: "psd", price: 499, img: "https://via.placeholder.com/600x400/111/fff?text=Valorant+Pack" },
            { id: 2, name: "Cinematic Skin LUTs", type: "lut", price: 199, img: "https://via.placeholder.com/600x400/111/fff?text=Skin+LUTs" },
            { id: 3, name: "Thumbnail Overlays v2", type: "psd", price: 299, img: "https://via.placeholder.com/600x400/111/fff?text=Overlay+Pack" },
            { id: 4, name: "Neon Glow Brushes", type: "psd", price: 149, img: "https://via.placeholder.com/600x400/111/fff?text=Brushes" }
        ];

        let cart = [];

        function render(items = products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            items.forEach(p => {
                grid.innerHTML += `
                    <div class="p-card">
                        <div class="img-container"><img src="${p.img}"></div>
                        <div class="p-info">
                            <span>Category: ${p.type.toUpperCase()}</span>
                            <h3>${p.name}</h3>
                            <div class="p-bottom">
                                <b class="p-price">₹${p.price}</b>
                                <button class="add-to-cart" onclick="addToCart(${p.id})">Add Item</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            update();
            toggleCart(true);
        }

        function update() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="c-item">
                        <div><p style="font-weight:700;">${item.name}</p><p style="color:var(--p); font-size:13px;">₹${item.price}</p></div>
                        <button class="remove-btn" onclick="remove(${index})">Remove</button>
                    </div>
                `;
            });
            document.getElementById('total-price').innerText = `₹${total}`;
        }

        function remove(index) { cart.splice(index, 1); update(); }

        function searchProducts() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            render(filtered);
        }

        function filter(type) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = type === 'all' ? products : products.filter(p => p.type === type);
            render(filtered);
        }

        function toggleCart(forceOpen = false) {
            const panel = document.getElementById('cart-panel');
            if(forceOpen) panel.classList.add('active');
            else panel.classList.toggle('active');
        }

        function showModal() { if(cart.length > 0) document.getElementById('pay-modal').classList.add('active'); }
        function hideModal() { document.getElementById('pay-modal').classList.remove('active'); }

        function confirmOrder() {
            let order = cart.map(i => i.name).join(', ');
            let total = cart.reduce((s, i) => s + i.price, 0);
            let msg = `Gfx_PI Elite Store ORDER 🚀%0A%0A📦 Items: ${order}%0A💰 Total: ₹${total}%0A%0APayment done. Check screenshot!`;
            window.open(`https://wa.me/917889967604?text=${msg}`, '_blank');
            cart = []; update(); hideModal(); toggleCart();
        }

        render();
    </script>
</body>
</html>
